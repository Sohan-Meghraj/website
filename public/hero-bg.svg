<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2A2A4A" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#1A1A2E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0A1A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#B8860B" fill-opacity="0.18"/>
    </pattern>
    <pattern id="grain" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="0.6" fill="#ffffff" fill-opacity="0.04"/>
      <circle cx="80" cy="60" r="0.5" fill="#ffffff" fill-opacity="0.05"/>
      <circle cx="50" cy="100" r="0.7" fill="#ffffff" fill-opacity="0.03"/>
      <circle cx="100" cy="20" r="0.5" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" fill="url(#dots)"/>
  <rect width="1200" height="800" fill="url(#grain)"/>
</svg>
